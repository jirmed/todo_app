// FILE: .github/workflows/ci.yaml
name: CI Backend Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    name: Build & Push Images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: backend,  context: ./backend,  image: ghcr.io/jirmed/todo-backend }
          - { name: frontend, context: ./frontend, image: ghcr.io/jirmed/todo-frontend }
          - { name: proxy,    context: ./nginx,   image: ghcr.io/jirmed/todo-proxy }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Vygeneruje tagy a labels:
      # - latest (jen na default branch)
      # - sha-xxxxxxx
      # - vX.Y.Z a vX.Y (pouze pro semver tagy)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.component.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},enable={{is_semver}}
            type=semver,pattern={{major}}.{{minor}},enable={{is_semver}}

      - name: Build and push ${{ matrix.component.name }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.component.context }}
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.component.name }}
            type=registry,ref=${{ matrix.component.image }}:latest
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}

  deploy:
    needs: build-backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ vars.host_ip }} >> ~/.ssh/known_hosts

      - name: Deploy stack over SSH
        env:
          SSH_USER: ubuntu
          SSH_HOST: ${{ vars.host_ip }}
        run: |
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes docker-compose.yaml $SSH_USER@$SSH_HOST:/home/ubuntu/
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes docker-compose.prod.yaml $SSH_USER@$SSH_HOST:/home/ubuntu/
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes $SSH_USER@$SSH_HOST "docker stack deploy -c /home/ubuntu/docker-compose.yaml -c /home/ubuntu/docker-compose.prod.yaml todoapp"
