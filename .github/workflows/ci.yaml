name: CI Backend Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: backend,  context: ./backend,  image: ghcr.io/jirmed/todo-backend }
          - { name: frontend, context: ./frontend, image: ghcr.io/jirmed/todo-frontend }
          - { name: proxy,    context: ./nginx,   image: ghcr.io/jirmed/todo-proxy }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.component.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},prefix=v
            type=semver,pattern={{major}}.{{minor}},prefix=v
            type=semver,pattern={{major}},prefix=v

      # ───────────────────────────────────────────────────────────
      - name: Build (no push) ${{ matrix.component.name }} for PR
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          push: false
          platforms: linux/arm64,linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: |
            type=gha,scope=${{ matrix.component.name }}
            type=registry,ref=${{ matrix.component.image }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.component.name }}
            type=registry,ref=${{ matrix.component.image }}:buildcache,mode=max

      - name: Build & push ${{ matrix.component.name }} (main)
        if: github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: |
            type=gha,scope=${{ matrix.component.name }}
            type=registry,ref=${{ matrix.component.image }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.component.name }}
            type=registry,ref=${{ matrix.component.image }}:buildcache,mode=max

      - name: Build & push RELEASE ${{ matrix.component.name }} (tags) with provenance/SBOM
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: mode=max
          sbom: true
          cache-from: |
            type=gha,scope=${{ matrix.component.name }}
            type=registry,ref=${{ matrix.component.image }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.component.name }}
            type=registry,ref=${{ matrix.component.image }}:buildcache,mode=max

  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -t ed25519 -H ${{ vars.host_ip }} >> ~/.ssh/known_hosts

      - name: Deploy stack over SSH
        env:
          SSH_USER: ubuntu
          SSH_HOST: ${{ vars.host_ip }}
        run: |
          scp -o StrictHostKeyChecking=yes docker-compose.yaml $SSH_USER@$SSH_HOST:/home/ubuntu/
          scp -o StrictHostKeyChecking=yes docker-compose.prod.yaml $SSH_USER@$SSH_HOST:/home/ubuntu/
          ssh -o StrictHostKeyChecking=yes $SSH_USER@$SSH_HOST \
            "docker stack deploy -c /home/ubuntu/docker-compose.yaml -c /home/ubuntu/docker-compose.prod.yaml todoapp"
